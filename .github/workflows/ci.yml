name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend – Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
        working-directory: backend
      - run: uv run ruff check .
        working-directory: backend
      - run: uv run ruff format --check .
        working-directory: backend

  backend-typecheck:
    name: Backend – Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
        working-directory: backend
      - run: PYTHONPATH=.:.. uv run --extra dev mypy --strict app/
        working-directory: backend

  backend-test:
    name: Backend – Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
        working-directory: backend
      - run: PYTHONPATH=.:.. uv run --extra dev pytest -q
        working-directory: backend

  backend-golden:
    name: Backend – Golden Set
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
        working-directory: backend
      - run: PYTHONPATH=.:.. uv run --extra dev pytest -q app/classifier/eval/golden.py -m golden
        working-directory: backend

  docker-build:
    name: Docker – Build Service Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build api worker sftp-ingest migrate

  full-stack-smoke:
    name: Smoke – Full Compose Pipeline
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - backend-golden
      - docker-build
    if: ${{ vars.RUN_FULL_STACK_SMOKE == '1' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install SFTP client helpers
        run: sudo apt-get update && sudo apt-get install -y openssh-client sshpass
      - run: uv sync --extra dev
        working-directory: backend
      - name: Start full stack
        run: docker compose up -d --build db redis minio sftp vault vault-init migrate api worker sftp-ingest
      - name: Run smoke test
        run: PYTHONPATH=.:.. uv run --extra dev pytest -q tests/smoke -m smoke
        working-directory: backend
      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200
      - name: Stop full stack
        if: always()
        run: docker compose down -v

  backend-secrets-check:
    name: Backend – No Hardcoded Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # Detect actual hardcoded credential assignments (password = "literal")
          # Excludes type annotations (password: str), parameter names,
          # and assignments from variables (self._password = password).
          hits=$(grep -rEn "password\s*=\s*['\"]" backend/app/ --exclude-dir=__pycache__ \
            | grep -v vault.py || true)
          if [ -n "$hits" ]; then
            echo "::error::Hardcoded password literal found outside vault.py"
            echo "$hits"
            exit 1
          fi

  backend-layer-check:
    name: Backend – Layer Boundary Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Checking no SQLAlchemy imports in api layer..."
          # deps.py is the session-injection adapter and is allowed to import AsyncSession
          grep -rn 'from sqlalchemy\|import sqlalchemy' backend/app/api/ \
            --exclude='deps.py' && exit 1 || true
          grep -rn 'from app.db.models\|import app.db.models' backend/app/api/ && exit 1 || true
          echo "Checking no HTTPException imports in repositories layer..."
          grep -rn 'from fastapi\|import fastapi' backend/app/repositories/ && exit 1 || true
          grep -rn 'HTTPException' backend/app/repositories/ && exit 1 || true
          echo "Checking no cache invalidation in routers..."
          grep -rn 'FastAPICache.clear\|fastapi_cache' backend/app/api/ && exit 1 || true
          echo "All layer boundary checks passed."

  frontend-lint:
    name: Frontend – Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm run lint
        working-directory: frontend
      - run: pnpm run format:check
        working-directory: frontend

  frontend-test:
    name: Frontend – Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm run test --run
        working-directory: frontend

  gitleaks:
    name: Gitleaks – Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
