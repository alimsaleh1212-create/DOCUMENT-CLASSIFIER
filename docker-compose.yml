version: "3.9"

services:
  vault:
    image: hashicorp/vault:1.15
    command: server -dev -dev-root-token-id="${VAULT_TOKEN:-dev-root-token}"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-dev-root-token}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault-init:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      POSTGRES_USER: "${POSTGRES_USER:-docclass}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-docclass}"
      POSTGRES_DB: "${POSTGRES_DB:-docclass}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      SFTP_USER: "${SFTP_USER:-docscanner}"
      SFTP_PASSWORD: "${SFTP_PASSWORD:-scan123}"
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY:-dev-jwt-signing-key}"
    volumes:
      - ./docker/vault-init.sh:/vault-init.sh:ro
    entrypoint: ["/bin/sh", "/vault-init.sh"]
    restart: "no"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-docclass}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-docclass}"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docclass}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  sftp:
    image: atmoz/sftp
    # Cap nofile ulimit. Docker's default (~1B) causes OpenSSH 8.4's
    # closefrom() shim to loop close() over every FD on each connection,
    # hanging internal-sftp before the SFTP version exchange.
    # See https://github.com/atmoz/sftp/issues/378
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      # Mount the volume at the chroot root so incoming/, processed/, and
      # quarantine/ live on the same filesystem — POSIX rename() can't
      # cross filesystems, and sftp-ingest moves files between them.
      - sftpdata:/home/docscanner
      # Init script creates the subdirs with docscanner ownership; volume
      # mount roots inherit root ownership which blocks user writes.
      - ./docker/sftp/fix-permissions.sh:/etc/sftp.d/fix-permissions.sh:ro
    command: "${SFTP_USER:-docscanner}:${SFTP_PASSWORD}:1001"

  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-docclass}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-docclass}"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-docclass}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-docclass}"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"

  sftp-ingest:
    build:
      context: .
      dockerfile: docker/sftp_ingest.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      sftp:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      SFTP_HOST: "sftp"
      SFTP_PORT: "22"
      SFTP_USER: "${SFTP_USER:-docscanner}"
      SFTP_PASSWORD: "${SFTP_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/sftp-ingest.heartbeat"]
      interval: 10s
      timeout: 3s
      retries: 6

  frontend:
    build:
      context: frontend/
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:80"
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: "http://localhost:${API_PORT:-8000}"

  pgadmin:
    image: dpage/pgadmin4:8.13
    pull_policy: never
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@docclass.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-admin}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmindata:/var/lib/pgadmin

volumes:
  pgdata:
  redisdata:
  miniodata:
  sftpdata:
  pgadmindata:
