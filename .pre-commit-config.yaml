repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2, fastapi, sqlalchemy>=2]
        args: [--strict, backend/app/]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && pnpm run lint'
        language: system
        types: [file]
        files: ^frontend/src/.*\.[jt]sx?$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && pnpm run format:check'
        language: system
        types: [file]
        files: ^frontend/src/.*\.[jt]sx?$
        pass_filenames: false